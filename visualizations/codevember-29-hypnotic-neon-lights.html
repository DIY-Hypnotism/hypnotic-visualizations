<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>CodePen - #CodeVember 29 | Hypnotic neon lights</title>
  <link rel="stylesheet" href="./codevember-29-hypnotic-neon-lights/style.css">
</head>
<body>
<!-- partial:index.partial.html -->
<canvas id=a></canvas>
<script id=fragmentShader type="x-shader/x-fragment">
precision mediump float;
uniform float time;
uniform float width;
uniform float height;

vec2 R(vec2 p,float a) {
	return vec2( p.x*cos(a) + p.y*sin(a), 
			    -p.x*sin(a) + p.y*cos(a));
}


void main() {
	vec2 resolution = vec2(width, height);
  float vc = time / 50.0;
	float vt = 1000.0 + sin(sin(time/16.0)*2.0*3.1415927) * 7000.0;
	float vr = time / 20.0;
	vec2 c0 = (gl_FragCoord.xy / resolution) - vec2(0.5 + cos(time*0.3) * sin(time * 0.1) * 0.3, 0.5 + sin(time*0.3) * sin(time * 0.2) * 0.3);
	vec2 c  = -R(c0, vr)*8.0; 
	float val = 0.5 + sin((((vt - c.x - c.y) / 2.0)*(0.5+c.x)*(c.y+0.5) + vt+ c.x + c.y)/500.0);
	gl_FragColor = vec4(vec3(val* (0.2+sin(sin(1.0+vc)* 10.0 *c.x*c.y)*0.8), val * (0.3+cos(2.0 + c.x*c.y*sin(vc)* 10.0 )*0.7), val * (0.3+cos(1.0 + c.x*c.y *sin(vc)* 10.0))*0.7), 1.0);
}
</script>
	
<script id=vertexShader type="x-shader/x-vertex">
attribute vec3 pos;

void main() {
	gl_Position=vec4(pos, 1.0);
}
</script>
<!-- partial -->
  <script>
    const frag = document.getElementById('fragmentShader').textContent;
    const vert = document.getElementById('vertexShader').textContent;
    const canvas = document.getElementById('a');
    const gl = canvas.getContext('webgl');
    let program = null;
    let widthLocation = null;
    let heightLocation = null;
    let timeLocation = null;
    let animationRunning = false;

    function compileShader(type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);

      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        throw new Error(gl.getShaderInfoLog(shader) || 'Failed to compile shader.');
      }

      return shader;
    }

    function createProgram(vertexSource, fragmentSource) {
      const vertexShader = compileShader(gl.VERTEX_SHADER, vertexSource);
      const fragmentShader = compileShader(gl.FRAGMENT_SHADER, fragmentSource);
      const nextProgram = gl.createProgram();

      gl.attachShader(nextProgram, vertexShader);
      gl.attachShader(nextProgram, fragmentShader);
      gl.linkProgram(nextProgram);

      if (!gl.getProgramParameter(nextProgram, gl.LINK_STATUS)) {
        throw new Error(gl.getProgramInfoLog(nextProgram) || 'Failed to link program.');
      }

      gl.deleteShader(vertexShader);
      gl.deleteShader(fragmentShader);

      return nextProgram;
    }

    function resize() {
      const scale = Math.max(1, window.devicePixelRatio || 1);
      const width = Math.max(1, Math.round(window.innerWidth * scale));
      const height = Math.max(1, Math.round(window.innerHeight * scale));

      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }

      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      gl.viewport(0, 0, canvas.width, canvas.height);
    }

    function drawFrameAt(timeMs) {
      resize();
      gl.clearColor(0, 0, 0, 1);
      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.useProgram(program);
      gl.uniform1f(widthLocation, canvas.width);
      gl.uniform1f(heightLocation, canvas.height);
      gl.uniform1f(timeLocation, timeMs * 0.001);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    }

    function loop(time) {
      drawFrameAt(time);
      if (animationRunning) {
        requestAnimationFrame(loop);
      }
    }

    function start() {
      if (animationRunning) {
        return;
      }

      animationRunning = true;
      requestAnimationFrame(loop);
    }

    function setup() {
      if (!gl) {
        throw new Error('WebGL is not available.');
      }

      program = createProgram(vert, frag);
      gl.useProgram(program);

      const vertices = new Float32Array([1, 1, -1, 1, 1, -1, -1, -1]);
      const buffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

      const positionLocation = gl.getAttribLocation(program, 'pos');
      gl.enableVertexAttribArray(positionLocation);
      gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

      widthLocation = gl.getUniformLocation(program, 'width');
      heightLocation = gl.getUniformLocation(program, 'height');
      timeLocation = gl.getUniformLocation(program, 'time');

      window.addEventListener('resize', resize);
      window.addEventListener('diyHypnotismStart', resize);
      resize();
      start();
    }

    window.renderFrame = async function (timeMs) {
      drawFrameAt(timeMs);
    };

    setup();
  </script>
  <script src="./support/renderframe-bridge.js"></script>
</body>
</html>
